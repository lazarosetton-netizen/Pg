workflows:
  android-apk:
    name: Gerar APK Pg Final
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar Dependencias
        script: |
          npm install
          npm install @capacitor/android @capacitor/core @capacitor/cli
      - name: Build do Projeto Web
        script: |
          npm run build
      - name: Resetar e Criar Pasta Android
        script: |
          # Remove pastas antigas para garantir que nada venha errado
          rm -rf android
          npx cap add android
          npx cap copy android
      - name: Liberar Internet e Sites Externos
        script: |
          # Adiciona permissão de Internet e tráfego de sites de notícias
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i '' 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
      - name: Sincronizar Final
        script: npx cap sync android
      - name: Gerar APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - seu-email@gmail.com
