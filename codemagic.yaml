workflows:
  android-apk:
    name: Gerar APK Pg - Correcao Total
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar Dependencias
        script: |
          npm install
          npm install @capacitor/android @capacitor/core @capacitor/cli
      - name: Configurar VITE_BASE e API_KEY
        script: |
          # 1. Força o Vite a usar caminhos relativos para o Android não abrir tela branca
          sed -i '' "s/plugins: \[react(), tailwindcss()\],/plugins: [react(), tailwindcss()], base: '.\/',/" vite.config.ts
          
          # 2. Cria o arquivo de ambiente com a sua chave (Substitua abaixo)
          echo "VITE_GEMINI_API_KEY=COLOQUE_AQUI_SUA_CHAVE_DO_GEMINI" > .env
      - name: Build do Projeto Web
        script: |
          npm run build
      - name: Preparar Pasta Android
        script: |
          # Remove e recria para evitar lixo de builds anteriores
          rm -rf android
          npx cap add android
          npx cap copy android
      - name: Ajustar Permissoes Android (Internet e HTTP)
        script: |
          # Adiciona permissão de internet no Manifesto que estava faltando
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          
          # Permite que o app acesse sites de notícias (Cleartext)
          sed -i '' 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
      - name: Sincronizar Final
        script: npx cap sync android
      - name: Gerar APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - seu-email@gmail.com
