workflows:
  android-apk:
    name: Gerar APK Pg Final - Forçar Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar Dependencias
        script: |
          npm install
          npm install @capacitor/android @capacitor/core @capacitor/cli
      - name: Configurar Chave de API e VITE_BASE
        script: |
          echo "VITE_GEMINI_API_KEY=AIzaSyCFlkjLQ9M4WoK-qVKQ_P8VPs1iy7Kwce0" > .env
          sed -i '' "s/plugins: \[react(), tailwindcss()\],/plugins: [react(), tailwindcss()], base: '.\/',/" vite.config.ts
      - name: Build do Projeto Web
        script: |
          # Comando para ignorar erros de TypeScript e gerar os arquivos
          npx vite build
      - name: Preparar Pasta Android do Zero
        script: |
          rm -rf android
          npx cap add android
          npx cap copy android
      - name: Ajustar Permissoes de Internet e Seguranca
        script: |
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i '' 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
      - name: Sincronizar Final
        script: npx cap sync android
      - name: Gerar APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - seu-email@gmail.com
