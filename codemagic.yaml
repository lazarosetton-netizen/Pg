workflows:
  android-apk:
    name: PG News - Versao Final Estavel
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar Dependencias
        script: |
          npm install
          npm install @google/generative-ai @capacitor/android @capacitor/core @capacitor/cli
      - name: Configurar Vite e Chave
        script: |
          echo "VITE_GEMINI_API_KEY=AIzaSyCFlkjLQ9M4WoK-qVKQ_P8VPs1iy7Kwce0" > .env
          sed -i '' "s/plugins: \[react(), tailwindcss()\],/plugins: [react(), tailwindcss()], base: '.\/',/" vite.config.ts
      - name: Build Web
        script: |
          npx vite build
      - name: Preparar Android
        script: |
          rm -rf android
          npx cap add android
          npx cap copy android
      - name: Reset de Permissoes de Rede
        script: |
          # Adiciona permissoes de internet no arquivo principal
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" /> \
          <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' android/app/src/main/AndroidManifest.xml
          
          # FORÇA o Android a aceitar conexões sem HTTPS (Cleartext)
          sed -i '' 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
      - name: Sincronizar e Compilar
        script: |
          npx cap sync android
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - seu-email@gmail.com
